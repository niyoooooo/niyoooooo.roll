<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>后滚翻AI动作分析系统 | 完整录制分析+本地视频上传</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a1f1e 0%, #0c2b2a 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'SF Pro Text', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(22, 40, 38, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
            padding: 1.5rem;
            transition: all 0.2s;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.25rem 0;
            color: #F2E8CF;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 small {
            font-size: 0.85rem;
            background: #2c5f5a;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: normal;
            color: #E9F5E1;
        }

        .sub {
            color: #b3d9d2;
            border-left: 3px solid #ffb347;
            padding-left: 14px;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        .video-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 30px;
        }

        .camera-card, .analysis-card {
            flex: 1;
            min-width: 280px;
            background: #1e3a36;
            border-radius: 2rem;
            padding: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid #3b6e68;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 1.2rem;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px black;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            justify-content: center;
        }

        button {
            background: #f4a261;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #1e2a2a;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-family: inherit;
        }

        button:active { transform: scale(0.96); background: #e9924b; }
        button.secondary { background: #3f7e74; color: white; }
        button.danger { background: #bc6c25; color: #ffe6c7; }
        button.success { background: #2a9d8f; color: white; }
        .record-btn { background: #d33; color: white; box-shadow: 0 0 8px #ff7777; }
        .record-btn.recording { background: #a00; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; box-shadow: 0 0 0 3px #ff8888; }
        }

        .file-upload {
            background: #2c5f5a;
            border-radius: 60px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
            transition: 0.2s;
        }
        .file-upload:hover { background: #3f7e74; }
        .file-upload input { display: none; }

        .analysis-box {
            background: #0f2c28;
            border-radius: 1.2rem;
            padding: 1rem;
            margin-top: 8px;
        }
        .score-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #2c6b63;
            padding-bottom: 10px;
            margin-bottom: 14px;
        }
        .score {
            font-size: 2.5rem;
            font-weight: bold;
            color: #F4D58C;
        }
        .mistake-list {
            background: #1c332f;
            border-radius: 1rem;
            padding: 12px;
            max-height: 260px;
            overflow-y: auto;
        }
        .mistake-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #2d6059;
            font-size: 0.85rem;
            color: #ffe0b5;
            line-height: 1.4;
        }
        .badge {
            background: #e76f51;
            border-radius: 30px;
            padding: 2px 12px;
            font-weight: bold;
            font-size: 0.7rem;
            white-space: nowrap;
            display: inline-block;
        }
        .good-badge { background: #2a9d8f; }
        
        .comparison-container {
            margin-top: 20px;
            background: #173633;
            border-radius: 1.5rem;
            padding: 1rem;
        }
        .comparison-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 10px 0;
        }
        .thumb-vid {
            flex: 1;
            min-width: 140px;
            background: #000;
            border-radius: 14px;
            aspect-ratio: 16/9;
            overflow: hidden;
            position: relative;
        }
        .thumb-vid video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-control {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        input[type="range"] {
            flex: 2;
            min-width: 160px;
        }
        .label-icon {
            font-weight: bold;
            color: #ffcd94;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #7aa59e;
            margin-top: 25px;
        }
        @media (max-width: 780px) {
            .app-container { padding: 1rem; }
            button { padding: 6px 14px; font-size: 0.8rem;}
            .score { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <h1>🤸 后滚翻 · 智能教练 <small>后置摄像头 + 完整录制分析</small></h1>
    <div class="sub">📸 强制后置摄像头 · 录制后自动分析 · 上传本地视频 · 慢放对比纠错</div>

    <div class="video-panel">
        <div class="camera-card">
            <div class="video-wrapper" id="cameraWrapper">
                <video id="inputVideo" autoplay playsinline muted></video>
                <canvas id="poseCanvas" width="640" height="360"></canvas>
            </div>
            <div class="controls">
                <button id="switchCameraBtn" class="secondary">🔄 切换后置</button>
                <button id="startRecordBtn" class="record-btn">🔴 开始录制</button>
                <button id="stopRecordBtn" class="danger" disabled>⏹️ 停止录制</button>
                <button id="analyzeRecordedBtn" class="secondary">🔍 重新分析录制</button>
            </div>
            <div class="analysis-box">
                <div class="score-area">
                    <span>🎯 实时姿态评分</span>
                    <span class="score" id="liveScore">--</span>
                </div>
                <div id="liveHints" class="mistake-list" style="max-height: 100px;">
                    <div class="mistake-item">⚡ 等待姿态检测启动...</div>
                </div>
            </div>
        </div>

        <div class="analysis-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px;">
                <div style="font-weight: bold;">📋 动作纠错报告</div>
                <label class="file-upload">
                    📁 上传本地视频
                    <input type="file" id="uploadVideoInput" accept="video/*">
                </label>
            </div>
            <div id="detailedMistakes" class="mistake-list">
                <div class="mistake-item">✨ 录制视频后会自动分析，或点击「重新分析录制」按钮</div>
                <div class="mistake-item">📌 也可上传本地视频进行分析纠错</div>
            </div>
            <div style="margin-top: 12px;">
                <div class="label-icon">🎬 慢放控制 (右侧视频)</div>
                <div class="slider-control">
                    <span>🐢 速度</span>
                    <input type="range" id="playbackRateSlider" min="0.2" max="1.5" step="0.05" value="0.5">
                    <span id="rateValue">0.5x</span>
                    <button id="applyRateBtn" class="secondary" style="padding: 4px 12px;">应用</button>
                </div>
            </div>
        </div>
    </div>

    <div class="comparison-container">
        <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
            <span>📼 动作对比</span>
            <span id="compareStatus" style="font-size:0.75rem;">✅ 录制或上传视频后自动分析</span>
        </div>
        <div class="comparison-row">
            <div class="thumb-vid">
                <video id="refVideo" loop muted></video>
                <div style="text-align:center; background:#000000aa; color:white; font-size:0.7rem;">⭐ 标准后滚翻参考</div>
            </div>
            <div class="thumb-vid">
                <video id="userRecordedVideo" controls loop></video>
                <div style="text-align:center; background:#000000aa; color:white; font-size:0.7rem;">📌 你的动作视频</div>
            </div>
        </div>
    </div>
    <footer>⚡ 后置摄像头专用 | 录制完成后自动抽帧分析姿态 | 基于MediaPipe提供低头/团身/推手纠错</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
    // DOM 元素
    const videoElement = document.getElementById('inputVideo');
    const poseCanvas = document.getElementById('poseCanvas');
    const startRecordBtn = document.getElementById('startRecordBtn');
    const stopRecordBtn = document.getElementById('stopRecordBtn');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const analyzeRecordedBtn = document.getElementById('analyzeRecordedBtn');
    const liveScoreSpan = document.getElementById('liveScore');
    const liveHintsDiv = document.getElementById('liveHints');
    const detailedMistakesDiv = document.getElementById('detailedMistakes');
    const userRecordedVideo = document.getElementById('userRecordedVideo');
    const refVideo = document.getElementById('refVideo');
    const playbackRateSlider = document.getElementById('playbackRateSlider');
    const rateValueSpan = document.getElementById('rateValue');
    const applyRateBtn = document.getElementById('applyRateBtn');
    const uploadVideoInput = document.getElementById('uploadVideoInput');

    // 会话类：隔离每次录制/分析的数据
    class RollAnalysisSession {
        constructor() {
            this.mediaRecorder = null;
            this.recordedChunks = [];
            this.isRecording = false;
            this.recordedBlob = null;      // 本次会话的录制Blob
            this.analyzedResult = null;    // 本次会话的分析结果
            this.tempVideoUrl = null;      // 本次会话的临时视频URL
        }

        // 清空会话资源
        clear() {
            if (this.mediaRecorder) this.mediaRecorder.stop();
            this.recordedChunks = [];
            this.isRecording = false;
            this.recordedBlob = null;
            this.analyzedResult = null;
            if (this.tempVideoUrl) {
                URL.revokeObjectURL(this.tempVideoUrl);
                this.tempVideoUrl = null;
            }
        }
    }

    // 全局变量（仅保留必要的共享资源）
    let currentStream = null;
    let pose = null;
    let currentSession = new RollAnalysisSession(); // 当前活跃会话
    let isAnalyzing = false; // 分析并发锁

    // 加载参考视频
    refVideo.src = 'https://cdn.pixabay.com/video/2022/08/16/121416-745012139_small.mp4'; // 示例参考视频

    // 获取后置摄像头
    async function getBackCameraStream() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');
        const backCamera = videoDevices.find(device => 
            device.label.toLowerCase().includes('back') || 
            device.label.toLowerCase().includes('rear') ||
            device.label.toLowerCase().includes('environment')
        );
        const constraints = {
            video: backCamera ? { deviceId: { exact: backCamera.deviceId } } : { facingMode: { exact: "environment" } },
            audio: false
        };
        try {
            return await navigator.mediaDevices.getUserMedia(constraints);
        } catch (err) {
            console.warn("后置摄像头获取失败，降级", err);
            return await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        }
    }

    // 初始化Pose检测器
    async function initPoseDetector() {
        pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
            smoothSegmentation: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(onPoseResults);
    }

    // 初始化摄像头（支持重置Pose）
    async function initCamera(resetPose = false) {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }

        // 重置Pose实例
        if (resetPose && pose) {
            pose.close();
            pose = null;
            await initPoseDetector();
        }

        try {
            currentStream = await getBackCameraStream();
            videoElement.srcObject = currentStream;
            await videoElement.play();
            if (poseCanvas.width !== videoElement.videoWidth && videoElement.videoWidth) {
                poseCanvas.width = videoElement.videoWidth;
                poseCanvas.height = videoElement.videoHeight;
            }
        } catch (err) {
            console.error("摄像头错误", err);
            liveHintsDiv.innerHTML = `<div class="mistake-item">❌ 无法获取后置摄像头，请检查权限</div>`;
        }
    }

    // 后滚翻动作分析核心算法
    function analyzeRollMistakes(landmarks) {
        if (!landmarks) return { score: 0, mistakes: ["未检测到人体姿态"], suggestions: [], details: {} };
        
        const leftShoulder = landmarks[11];
        const rightShoulder = landmarks[12];
        const nose = landmarks[0];
        const leftHip = landmarks[23];
        const rightHip = landmarks[24];
        const leftKnee = landmarks[25];
        const rightKnee = landmarks[26];
        const leftWrist = landmarks[15];
        const rightWrist = landmarks[16];
        const leftAnkle = landmarks[27];
        const rightAnkle = landmarks[28];
        
        // 低头检测：鼻子Y坐标相对于肩膀Y坐标
        const avgShoulderY = (leftShoulder.y + rightShoulder.y) / 2;
        const headDown = (nose.y - avgShoulderY) > 0.06;
        
        // 团身检测：膝盖到髋部的距离
        const hipCenter = { y: (leftHip.y + rightHip.y) / 2 };
        const kneeCenter = { y: (leftKnee.y + rightKnee.y) / 2 };
        const kneeToHipDistance = Math.abs(kneeCenter.y - hipCenter.y);
        const compactScore = Math.max(0, Math.min(1, 1 - kneeToHipDistance * 1.5));
        
        // 身体平衡检测：肩膀水平程度
        const shoulderBalance = 1 - Math.min(0.5, Math.abs(leftShoulder.x - rightShoulder.x) * 2);
        
        // 推手检测：手腕位置相对于肩膀
        let handPushReady = true;
        if (leftWrist && rightWrist) {
            const wristBelowShoulder = (leftWrist.y > leftShoulder.y + 0.05) || (rightWrist.y > rightShoulder.y + 0.05);
            handPushReady = !wristBelowShoulder;
        }
        
        // 膝盖弯曲程度（团身辅助）
        const kneeBent = (leftKnee.y > leftHip.y + 0.05) && (rightKnee.y > rightHip.y + 0.05);
        
        let mistakes = [];
        let suggestions = [];
        
        if (!headDown) {
            mistakes.push("⚠️ 低头不足");
            suggestions.push("练习时下巴夹住一张纸，保持低头含胸");
        }
        if (compactScore < 0.4) {
            mistakes.push("⚠️ 团身不紧");
            suggestions.push("双手抱膝前后滚动练习，增强团身惯性");
        }
        if (shoulderBalance < 0.7) {
            mistakes.push("⚠️ 身体歪斜");
            suggestions.push("双手推地时力量要均衡，沿脊柱直线滚动");
        }
        if (!handPushReady) {
            mistakes.push("⚠️ 推手位置错误");
            suggestions.push("手掌置于肩部两侧，掌心向上，着地瞬间用力推地");
        }
        if (!kneeBent && compactScore < 0.5) {
            mistakes.push("⚠️ 膝盖未靠近胸口");
            suggestions.push("滚动时主动收腿，膝盖贴近胸部");
        }
        
        if (mistakes.length === 0) {
            suggestions.push("动作标准！继续保持团身紧、低头稳、推手快的节奏");
        }
        
        // 计算总分
        let score = 60;
        if (headDown) score += 15;
        if (compactScore > 0.5) score += Math.floor(compactScore * 15);
        if (shoulderBalance > 0.7) score += 10;
        if (handPushReady) score += 10;
        if (kneeBent) score += 5;
        score = Math.min(100, Math.max(0, score));
        
        return { 
            score: score, 
            mistakes: mistakes,
            suggestions: suggestions,
            details: { headDown, compactScore, shoulderBalance, handPushReady, kneeBent }
        };
    }
    
    // 渲染分析结果到UI
    function renderAnalysisResult(result) {
        if (!result) return;
        
        // 更新实时评分
        liveScoreSpan.textContent = result.score;
        
        // 更新错误列表
        let mistakesHtml = '';
        if (result.mistakes.length > 0) {
            result.mistakes.forEach(mistake => {
                mistakesHtml += `<div class="mistake-item">${mistake}</div>`;
            });
        }
        result.suggestions.forEach(suggest => {
            mistakesHtml += `<div class="mistake-item">💡 ${suggest}</div>`;
        });
        detailedMistakesDiv.innerHTML = mistakesHtml;
    }

    // 分析录制的视频blob
    async function analyzeRecordedVideo(blob) {
        if (isAnalyzing) return null;
        isAnalyzing = true;
        
        try {
            if (!blob) {
                detailedMistakesDiv.innerHTML = `<div class="mistake-item">❌ 没有录制视频，请先录制</div>`;
                return null;
            }
            
            detailedMistakesDiv.innerHTML = `<div class="mistake-item">🔍 正在分析视频，请稍候...</div>`;
            
            // 创建临时video元素进行分析
            const tempVideo = document.createElement('video');
            tempVideo.muted = true;
            tempVideo.crossOrigin = "Anonymous";
            tempVideo.preload = "metadata";

            const videoUrl = URL.createObjectURL(blob);
            tempVideo.src = videoUrl;

            // 等待视频加载完成
            await new Promise((resolve, reject) => {
                tempVideo.onloadedmetadata = resolve;
                tempVideo.onerror = () => reject(new Error("视频加载失败"));
            });

            // 跳转到视频中间帧（更具代表性）
            tempVideo.currentTime = tempVideo.duration / 2;
            await new Promise(resolve => {
                tempVideo.onseeked = resolve;
                tempVideo.onerror = reject;
            });

            // 创建canvas抽帧
            const canvas = document.createElement('canvas');
            canvas.width = tempVideo.videoWidth;
            canvas.height = tempVideo.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(tempVideo, 0, 0, canvas.width, canvas.height);

            // 使用pose检测该帧
            const poseResults = await pose.send({ image: canvas });
            if (!poseResults.poseLandmarks) {
                throw new Error("未检测到人体姿态");
            }

            // 分析当前帧的错误（绑定到当前会话）
            currentSession.analyzedResult = analyzeRollMistakes(poseResults.poseLandmarks);
            
            // 更新UI
            renderAnalysisResult(currentSession.analyzedResult);

            // 释放临时资源
            URL.revokeObjectURL(videoUrl);
            return currentSession.analyzedResult;
        } catch (err) {
            detailedMistakesDiv.innerHTML = `<div class="mistake-item">❌ 分析失败：${err.message}</div>`;
            return null;
        } finally {
            isAnalyzing = false;
        }
    }
    
    // Pose检测结果回调
    function onPoseResults(results) {
        const canvasCtx = poseCanvas.getContext('2d');
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
        
        // 绘制姿态关键点
        if (results.poseLandmarks) {
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {
                color: '#00FF00',
                lineWidth: 2
            });
            drawLandmarks(canvasCtx, results.poseLandmarks, {
                color: '#FF0000',
                lineWidth: 1
            });
            
            // 实时分析并更新评分
            const realtimeResult = analyzeRollMistakes(results.poseLandmarks);
            liveScoreSpan.textContent = realtimeResult.score;
            
            // 实时提示（只显示前2条）
            let hintsHtml = '';
            if (realtimeResult.mistakes.length > 0) {
                realtimeResult.mistakes.slice(0, 2).forEach(mistake => {
                    hintsHtml += `<div class="mistake-item">${mistake}</div>`;
                });
            } else {
                hintsHtml = `<div class="mistake-item">✅ 姿态标准</div>`;
            }
            liveHintsDiv.innerHTML = hintsHtml;
        }
        canvasCtx.restore();
    }

    // 初始化页面
    async function initApp() {
        await initPoseDetector();
        await initCamera();
        
        // 开始录制按钮
        startRecordBtn.addEventListener('click', async () => {
            // 清空上一人的会话数据
            currentSession.clear();
            currentSession = new RollAnalysisSession();

            if (!currentStream) {
                await initCamera(true); // 重置摄像头+Pose
            }

            // 初始化录制器（绑定当前会话）
            currentSession.mediaRecorder = new MediaRecorder(currentStream, {
                mimeType: 'video/webm; codecs=vp9'
            });
            currentSession.mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    currentSession.recordedChunks.push(e.data);
                }
            };
            currentSession.mediaRecorder.onstop = async () => {
                currentSession.recordedBlob = new Blob(currentSession.recordedChunks, {
                    type: 'video/webm'
                });
                // 更新视频元素（绑定当前会话的Blob）
                if (currentSession.tempVideoUrl) URL.revokeObjectURL(currentSession.tempVideoUrl);
                currentSession.tempVideoUrl = URL.createObjectURL(currentSession.recordedBlob);
                userRecordedVideo.src = currentSession.tempVideoUrl;
                
                // 自动分析当前会话的视频
                await analyzeRecordedVideo(currentSession.recordedBlob);
                document.getElementById('compareStatus').textContent = "✅ 分析完成！可调整慢放速度对比";
            };

            // 开始录制
            currentSession.mediaRecorder.start();
            currentSession.isRecording = true;
            startRecordBtn.classList.add('recording');
            stopRecordBtn.disabled = false;
            liveHintsDiv.innerHTML = `<div class="mistake-item">📹 正在录制...</div>`;
        });

        // 停止录制按钮
        stopRecordBtn.addEventListener('click', () => {
            if (currentSession.mediaRecorder && currentSession.isRecording) {
                currentSession.mediaRecorder.stop();
                currentSession.isRecording = false;
                startRecordBtn.classList.remove('recording');
                stopRecordBtn.disabled = true;
                liveHintsDiv.innerHTML = `<div class="mistake-item">✅ 录制完成，正在分析...</div>`;
            }
        });

        // 重新分析录制视频
        analyzeRecordedBtn.addEventListener('click', async () => {
            if (currentSession.recordedBlob) {
                await analyzeRecordedVideo(currentSession.recordedBlob);
            } else {
                detailedMistakesDiv.innerHTML = `<div class="mistake-item">❌ 暂无录制视频，请先录制</div>`;
            }
        });

        // 切换摄像头（强制后置）
        switchCameraBtn.addEventListener('click', async () => {
            await initCamera(true);
            liveHintsDiv.innerHTML = `<div class="mistake-item">🔄 已切换到后置摄像头</div>`;
        });

        // 上传本地视频
        uploadVideoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 清空旧会话
            currentSession.clear();
            currentSession = new RollAnalysisSession();
            
            // 分析上传的视频（绑定当前会话）
            currentSession.recordedBlob = file;
            await analyzeRecordedVideo(file);
            
            // 更新视频预览（绑定当前会话）
            if (currentSession.tempVideoUrl) URL.revokeObjectURL(currentSession.tempVideoUrl);
            currentSession.tempVideoUrl = URL.createObjectURL(file);
            userRecordedVideo.src = currentSession.tempVideoUrl;
            document.getElementById('compareStatus').textContent = "✅ 上传视频分析完成！";
        });

        // 慢放控制
        playbackRateSlider.addEventListener('input', () => {
            rateValueSpan.textContent = `${playbackRateSlider.value}x`;
        });

        applyRateBtn.addEventListener('click', () => {
            userRecordedVideo.playbackRate = playbackRateSlider.value;
            liveHintsDiv.innerHTML = `<div class="mistake-item">🎬 播放速度已设为 ${playbackRateSlider.value}x</div>`;
        });
    }

    // 启动应用
    initApp().catch(err => {
        console.error("应用初始化失败", err);
        liveHintsDiv.innerHTML = `<div class="mistake-item">❌ 应用初始化失败：${err.message}</div>`;
    });
</script>
</body>
</html>
